short_bio: >-
  <p>
    I received my Ph.D. in Computer Science and Technology from <a href="https://english.neu.edu.cn" target="_blank">Northeastern University (China)</a>
    in January 2026, advised by Prof. <a href="http://faculty.neu.edu.cn/yuge/zh_CN/index.htm" target="_blank">Ge Yu</a> and Prof. <a href="https://neuzhangyf.github.io" target="_blank">Yanfeng Zhang</a>.
    I am currently a Postdoctoral Researcher and Associate Research Fellow 
    at <a href="https://english.neu.edu.cn" target="_blank">Northeastern University (China)</a>.
  </p>
  <p>
    My research interests include database transaction processing, databases on 
    emerging hardware, blockchain databases, and cloud-native databases.
  </p>

