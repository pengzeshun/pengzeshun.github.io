short_bio: >-
  <p>
    Zeshun Peng received his Ph.D. degree in Computer Science and Technology from 
    Northeastern University (China) in January 2026, under the supervision of Prof. Ge Yu 
    and Prof. Yanfeng Zhang. He is currently a Postdoctoral Researcher and Associate Research Fellow at 
    Northeastern University (China).
  </p>
  <p>
    His research interests include database transaction processing, databases on 
    emerging hardware, blockchain databases, and cloud-native databases. 
  </p>

